<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Midnight Fleet{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2">
</head>
<body>

<nav class="navbar navbar-expand-lg mf-navbar py-3">
    <div class="container-fluid px-md-5">
        <a class="navbar-brand mf-navbar-brand" href="{% url 'home' %}"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-house-door-fill" viewBox="0 0 16 16">
  <path d="M6.5 14.5v-3.505c0-.245.25-.495.5-.495h2c.25 0 .5.25.5.5v3.5a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5"/>
</svg></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto ms-4">
                <li class="nav-item">
                    <a class="nav-link mf-nav-link" href="{% url 'listar-veiculos' %}">Veículos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link mf-nav-link" href="{% url 'criar-veiculo' %}">Cadastrar Veículo</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link mf-nav-link" href="{% url 'listar-anuncios' %}">Anúncios</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto align-items-center gap-2">
                <li class="nav-item">
                    <span class="navbar-text" style="color: var(--mf-on-variant); font-size: 0.875rem;">
                        <span class="material-symbols-outlined align-middle" style="font-size:1rem;">account_circle</span>
                        {{ request.user.username }}
                    </span>
                </li>
                <li class="nav-item">
                    <a href="{% url 'logout' %}" class="btn btn-sm rounded-3 fw-bold px-3"
                       style="background: rgba(255,113,108,0.1); color: #ff716c; border: 1px solid rgba(255,113,108,0.3);">
                        Sair
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container-fluid px-md-5 mt-5 flex-grow-1">
    {% block content %}{% endblock %}
</main>

<footer class="mf-footer text-center py-4 mt-5">
    <small style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6;">
        © 2026 Midnight Fleet Experience. Editorial Collection.
    </small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
