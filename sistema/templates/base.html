<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Midnight Fleet{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=1">
</head>
<body>

<nav class="navbar navbar-expand-lg mf-navbar py-3">
    <div class="container-fluid max-w-1440 px-md-5">
        <a class="navbar-brand mf-navbar-brand" href="{% url 'home' %}">Midnight Fleet</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto ms-4">
                <li class="nav-item">
                    <a class="nav-link mf-nav-link" href="{% url 'listar-veiculos' %}">Acessar Veículos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link mf-nav-link" href="{% url 'criar-veiculo' %}">Cadastrar Veículo</a>
                </li>
            </ul>
            </div>
    </div>
</nav>

<main class="container-fluid max-w-1440 px-md-5 mt-5 flex-grow-1">
    {% block content %}{% endblock %}
</main>

<footer class="mf-footer text-center py-4 mt-5">
    <small style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6;">
        © 2026 Midnight Fleet Experience. Editorial Collection.
    </small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
