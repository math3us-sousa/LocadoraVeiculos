{% extends 'base.html' %}

{% block content %}
<h2>Veículos Disponíveis</h2>
<table class="table">
    <thead>
        <tr>
            <th>Marca/Modelo</th>
            <th>Ano</th>
            <th>Preço Diária</th>
        </tr>
    </thead>
    <tbody>
        {% for veiculo in veiculos %}
        <tr>
            <td>{{ veiculo.modelo }}</td> <td>{{ veiculo.ano }}</td>
            <td>R$ {{ veiculo.valor_diaria }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">Nenhum veículo cadastrado.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
