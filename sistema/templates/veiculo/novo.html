{% extends 'base.html' %}

{% block title %}Novo Veículo - Midnight Fleet{% endblock %}

{% block content %}
<style>
    .mf-form p {
        display: flex;
        flex-direction: column;
        margin-bottom: 1.5rem;
    }
    .mf-form label {
        color: var(--mf-on-variant);
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 0.5rem;
    }
    .mf-form input[type="text"],
    .mf-form input[type="number"],
    .mf-form select {
        background-color: var(--mf-surface-low);
        border: none;
        border-bottom: 2px solid var(--mf-outline);
        color: var(--mf-on-surface);
        padding: 0.75rem 1rem;
        border-radius: 0.375rem 0.375rem 0 0;
        transition: border-color 0.3s ease;
        width: 100%;
    }
    .mf-form input:focus,
    .mf-form select:focus {
        outline: none;
        border-color: var(--mf-primary);
        background-color: var(--mf-surface-low);
    }
    .mf-form input[type="file"] {
        background: transparent;
        color: var(--mf-on-variant);
        border: none;
        padding: 0;
    }
    .mf-form .helptext {
        font-size: 0.75rem;
        color: var(--mf-on-variant);
        margin-top: 0.25rem;
    }
</style>

<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="p-4 p-md-5 rounded-4 shadow-sm border border-secondary border-opacity-25" style="background: rgba(31, 43, 73, 0.4); backdrop-filter: blur(20px);">
            
            <div class="d-flex align-items-center gap-3 mb-4">
                <span class="material-symbols-outlined text-primary" style="font-size: 2.5rem;">add_circle</span>
                <h2 class="font-headline fw-bold text-white m-0">Cadastrar Novo Veículo</h2>
            </div>
            
            <form method="POST" enctype="multipart/form-data" class="mf-form">
                {% csrf_token %}
                
                {{ form.as_p }}
                
                <div class="d-flex justify-content-end gap-3 mt-5 pt-4 border-top border-secondary border-opacity-25">
                    <a href="{% url 'listar-veiculos' %}" class="btn btn-outline-light rounded-3 px-4" style="color: var(--mf-on-variant); border-color: var(--mf-outline);">Cancelar</a>
                    <button type="submit" class="btn btn-primary btn-gradient px-5 rounded-3 fw-bold border-0">Salvar Veículo</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
