<!DOCTYPE html>
<html lang="pt-br">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Midnight Fleet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>

<body class="d-flex flex-column">
    <div class="orb-top"></div>
    <div class="orb-bottom"></div>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center p-4" style="position:relative; z-index:10;">
        <form action="" method="post" class="login-card">
            {% csrf_token %}

            <!-- Branding -->
            <div class="px-4 px-md-5 pt-5 pb-4 text-center">
                <div class="icon-circle mx-auto mb-4">
                    <span class="material-symbols-outlined">lock_reset</span>
                </div>
                <h1 class="brand-title">Recuperar Senha</h1>
                <p class="brand-subtitle">Informe o e-mail cadastrado e enviaremos um link para redefinir sua senha.</p>
            </div>

            <!-- Campos -->
            <div class="px-4 px-md-5 pb-5 d-flex flex-column gap-4">

                <!-- E-mail -->
                <div>
                    <label class="mf-label" for="id_email">E-mail</label>
                    <div class="mf-input-wrap">
                        <span class="material-symbols-outlined input-icon">mail</span>
                        <input
                            type="email"
                            name="email"
                            id="id_email"
                            class="mf-input"
                            placeholder="seu@email.com"
                            required
                        >
                    </div>
                </div>

                <!-- Botão -->
                <button type="submit" class="btn-mf-primary">
                    <span>Enviar Link</span>
                    <span class="material-symbols-outlined" style="font-size:1.25rem;">send</span>
                </button>

                <!-- Voltar -->
                <p class="text-center mb-0" style="font-size:0.875rem; color:var(--mf-on-variant);">
                    Lembrou a senha?
                    <a href="{% url 'index' %}" class="link-primary-mf fw-bold ms-1">Entrar</a>
                </p>

            </div>
        </form>
    </main>

    <footer class="d-flex flex-column align-items-center gap-3 py-4 px-4" style="position:relative; z-index:10;">
        <p class="footer-copy mb-0">© 2024 Midnight Fleet Experience. Editorial Collection.</p>
    </footer>

    <div class="car-bg">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuCKJlk8RaTzMTt3PHgR5aNaMCjmJ4YcgVZj7k0ZifHzNtMmvJmGehwT7tjzyro-FdfOuPszH6YGKrXVYwvqoOo-lv5ZOLtP2wWjdJ0-ITwdtLVzElS5iznpc6PNZ9DREbuiFSVntZCzkhtwR6HwwgqfXXEixaI9zkEofIWy7fsM57EcAvFpsxvdpF7sKjaMKQrjV7A7sZkg8Cq4E8et9uCljUwYDYr1cAvyO5u6bfbp8jv_63CYNMXmqZLhRt3rfYdilffJrxc1Iw" alt="Luxury car">
    </div>
</body>
</html>
