<!DOCTYPE html>
<html lang="pt-br">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha Redefinida - Midnight Fleet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>

<body class="d-flex flex-column">
    <div class="orb-top"></div>
    <div class="orb-bottom"></div>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center p-4" style="position:relative; z-index:10;">
        <div class="login-card text-center">

            <div class="px-4 px-md-5 pt-5 pb-4">
                <div class="icon-circle mx-auto mb-4" style="background: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.25);">
                    <span class="material-symbols-outlined" style="color: #4ade80; font-size: 2rem;">check_circle</span>
                </div>

                <h1 class="brand-title" style="background: linear-gradient(135deg, #4ade80 0%, #84adff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                    Senha Redefinida!
                </h1>
                <p class="brand-subtitle mt-2">
                    Sua senha foi atualizada com sucesso. Você já pode entrar com as novas credenciais.
                </p>
            </div>

            <div class="px-4 px-md-5 pb-5">
                <a href="{% url 'index' %}" class="btn-mf-primary text-decoration-none" style="justify-content: center;">
                    <span class="material-symbols-outlined" style="font-size:1.25rem;">login</span>
                    <span>Ir para o Login</span>
                </a>
            </div>

        </div>
    </main>

    <footer class="d-flex flex-column align-items-center gap-3 py-4 px-4" style="position:relative; z-index:10;">
        <p class="footer-copy mb-0">© 2024 Midnight Fleet Experience. Editorial Collection.</p>
    </footer>

    <div class="car-bg">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuCKJlk8RaTzMTt3PHgR5aNaMCjmJ4YcgVZj7k0ZifHzNtMmvJmGehwT7tjzyro-FdfOuPszH6YGKrXVYwvqoOo-lv5ZOLtP2wWjdJ0-ITwdtLVzElS5iznpc6PNZ9DREbuiFSVntZCzkhtwR6HwwgqfXXEixaI9zkEofIWy7fsM57EcAvFpsxvdpF7sKjaMKQrjV7A7sZkg8Cq4E8et9uCljUwYDYr1cAvyO5u6bfbp8jv_63CYNMXmqZLhRt3rfYdilffJrxc1Iw" alt="Luxury car">
    </div>
</body>
</html>
